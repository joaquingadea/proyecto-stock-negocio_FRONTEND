<!doctype html>
<html lang="es">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta http-equiv="Content-Security-Policy" content="
default-src 'self';
script-src 'self' 'unsafe-inline' 'unsafe-eval';
style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net;
img-src 'self' data:;
connect-src 'self' http://localhost:8080;
">
  <link rel="stylesheet" href="css/bootstrap.min.css">
  <title>Navbar</title>
</head>
<div id="navBar">
</div>

<body>
  <div class="card-header gap-5 " id="mainContent">
    <div class="card shadow m-3">

      <h5 class="gap-5 text-center">Inicio</h5>
      <p class="text-center">
        Bienvenido al sistema de gestión de stock.
        Utilice el menú para navegar por las diferentes secciones.
      </p>
      <img class=" md" src="assets/images/foto totalmente real de un laburante.jpg" alt="foto real de un laburante.jpg">

    </div>
  </div>
  <div class="modal fade" id="miModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Ticket</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body" id="ticketBody"></div>
      </div>
    </div>
  </div>
</body>
<script src="js-app/inicio.js"></script>
<script type="module" src="js-app/main.js"></script>
<script src="./js/bootstrap.bundle.min.js"></script>

</html>
